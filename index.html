<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Accessories Manager</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 50px 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #666; font-size: 1.1em; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            color: white;
            background-color: #1a73e8;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #1557b0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mobile Accessories Manager</h1>
        <p>App is running successfully</p>
        
        <!-- This button connects your homepage to your privacy policy -->
        <a href="privacy-policy.html" class="btn">View Privacy Policy</a>
    </div>

</body>
</html>
